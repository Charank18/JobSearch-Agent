name: Automated Job Search & Apply (All Positions)

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      query:
        description: 'Job search query'
        required: false
        default: 'Entry Level'
      location:
        description: 'Job location'
        required: false
        default: 'India'
      max_jobs:
        description: 'Maximum jobs to scrape'
        required: false
        default: '15'

permissions:
  contents: write

jobs:
  search-and-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Create .env file
        run: |
          echo "LINKEDIN_USERNAME=${{ secrets.LINKEDIN_USERNAME }}" > .env
          echo "LINKEDIN_PASSWORD=${{ secrets.LINKEDIN_PASSWORD }}" >> .env
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> .env

      - name: Search & Apply - Entry Level Jobs
        run: |
          python main.py search "Entry Level" \
            -l "Bangalore, India" -l "Hyderabad, India" -l "India" \
            -m 15 --auto-apply --max-apply 20 \
            --generate-cv --generate-cover-letter --headless \
            -e "Entry level" -e "Internship" \
            --date-posted past_week
        continue-on-error: true

      - name: Search & Apply - Junior Positions
        run: |
          python main.py search "Junior" \
            -l "Mumbai, India" -l "Pune, India" -l "India" \
            -m 15 --auto-apply --max-apply 20 \
            --generate-cv --generate-cover-letter --headless \
            -e "Entry level" \
            --date-posted past_week
        continue-on-error: true

      - name: Search & Apply - Graduate Jobs
        run: |
          python main.py search "Graduate" \
            -l "Delhi, India" -l "Chennai, India" -l "India" \
            -m 15 --auto-apply --max-apply 20 \
            --generate-cv --generate-cover-letter --headless \
            -e "Entry level" \
            --date-posted past_week
        continue-on-error: true

      - name: Search & Apply - Fresher Jobs
        run: |
          python main.py search "Fresher" \
            -l "Bangalore, India" -l "India" \
            -m 15 --auto-apply --max-apply 20 \
            --generate-cv --generate-cover-letter --headless \
            -e "Entry level" \
            --date-posted past_week
        continue-on-error: true

      - name: Search & Apply - Analyst Roles
        run: |
          python main.py search "Analyst" \
            -l "Hyderabad, India" -l "India" \
            -m 12 --auto-apply --max-apply 15 \
            --generate-cv --generate-cover-letter --headless \
            -e "Entry level" \
            --date-posted past_week
        continue-on-error: true

      - name: Search & Apply - Associate Roles
        run: |
          python main.py search "Associate" \
            -l "Mumbai, India" -l "India" \
            -m 12 --auto-apply --max-apply 15 \
            --generate-cv --generate-cover-letter --headless \
            -e "Entry level" \
            --date-posted past_week
        continue-on-error: true

      - name: Search & Apply - Trainee Positions
        run: |
          python main.py search "Trainee" \
            -l "Pune, India" -l "India" \
            -m 10 --auto-apply --max-apply 15 \
            --generate-cv --generate-cover-letter --headless \
            -e "Entry level" \
            --date-posted past_week
        continue-on-error: true

      - name: Run custom search (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python main.py search "${{ github.event.inputs.query }}" \
            -l "${{ github.event.inputs.location }}" \
            -m ${{ github.event.inputs.max_jobs }} \
            --auto-apply --max-apply 25 \
            --generate-cv --generate-cover-letter --headless \
            -e "Entry level" -e "Internship"
        continue-on-error: true

      - name: Show applied jobs summary
        if: always()
        run: python main.py applied || true
        continue-on-error: true

      - name: Upload job results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-results-${{ github.run_number }}
          path: |
            output/
            jobs/
            logs/
          retention-days: 30

      - name: Commit results to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f jobs/*.json output/linkedin/*.json logs/*.log 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: hourly job search + auto-apply results $(date +%Y-%m-%d_%H:%M)"
          git push || true
